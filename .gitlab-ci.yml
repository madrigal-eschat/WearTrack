include:
  - component: $CI_SERVER_FQDN/to-be-continuous/pre-commit/gitlab-ci-pre-commit@~latest
    inputs:
      pre-commit-file: ".pre-commit-config.yaml"
      pre-commit-args: "--show-diff-on-failure"
      pre-commit-skip: "no-commit-to-branch,eslint-backend,eslint-frontend"
  - component: $CI_SERVER_FQDN/to-be-continuous/node/gitlab-ci-node@5.3.0
    inputs:
      image: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/node:24-bookworm"
      project-dir: "."
      build-args: "run build"
      test-args: "run test:ci"
      sbom-disabled: "true"
  - component: $CI_SERVER_FQDN/to-be-continuous/docker/gitlab-ci-docker@8.4.0
    inputs:
      build-args: "--platform linux/amd64 --platform linux/arm64"
      trivy-disabled: "true"
      sbom-disabled: "true"
      prod-publish-strategy: "auto"
  - component: $CI_SERVER_FQDN/to-be-continuous/playwright/gitlab-ci-playwright@1
    inputs:
      image: "mcr.microsoft.com/playwright:v1.61.1-noble"
      project-dir: "src/frontend"
  - component: $CI_SERVER_FQDN/to-be-continuous/kubernetes/gitlab-ci-k8s@~latest
    inputs:
      kubectl-image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine/k8s:1.33.2
      base-app-name: weartrack
      kustomize-enabled: "true"
      scripts-dir: k8s
      prod-space: home-entertainment
      environment-url: https://${K8S_INGRESS_HOST}
      prod-deploy-strategy: auto
      create-namespace-enabled: "true"
  - project: $CI_PROJECT_ROOT_NAMESPACE/ci-templates
    file: node-renovate-audit.yml

# Compile better-sqlite3 for arm64 and publish to the GitLab Package Registry.
# Almost always a no-op (exits immediately if the prebuilt already exists for
# this better-sqlite3 version). Must complete before node-build so the prebuilt
# is available for download.
better-sqlite3-arm64-prebuilt:
  stage: build
  tags:
    - arm64
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/node:24-bookworm
  timeout: 2 hours
  script:
    - bash scripts/build-better-sqlite3-arm64.sh
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

# Wait for the prebuilt to be available before running the build/test job.
# On arm64, npm-postinstall.sh downloads the prebuilt instead of compiling.
node-build:
  needs:
    - better-sqlite3-arm64-prebuilt

node-semgrep:
  variables:
    GIT_DEPTH: 0

# Run the Playwright e2e suite against the production image built by the docker
# component, attached as a service container (the real app + built frontend).
# The browser is local to this job and reaches the app at http://app:3000 — no
# dev server, no network tunnel. NODE_ENV is unset in the image so /api/__reset
# (used by globalSetup) stays enabled.
playwright:
  stage: package-test
  # The component's default rules only run on review environments
  # (REVIEW_ENABLED) or prod/integ branches. We test the built image directly,
  # so run on every pipeline except tags.
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  needs:
    - job: docker-buildah-build
      artifacts: true
  services:
    - name: $docker_image
      alias: app
  variables:
    BASE_URL: "http://app:3000"
    # Propagated to the `app` service container so /api/__reset is enabled even
    # if the image ever runs with NODE_ENV=production.
    E2E_TEST: "1"
    # Put the job and the `app` service on one network so the browser can reach
    # it by alias. Without this, runners using legacy service linking (e.g. the
    # amd64 runner) can't reach app:3000 and every test times out.
    FF_NETWORK_PER_BUILD: "true"

pre-commit:
  rules:
    - when: on_success

docker-buildah-build:
  tags:
    - buildah
  variables:
    DOCKER_BUILD_CONTEXT_VARIABLES: CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX

stages:
  - build
  - test
  - package-build
  - package-test
  - publish
  - deploy
  - production
