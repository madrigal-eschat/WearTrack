apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weartrack
spec:
  podSelector:
    matchLabels:
      app: weartrack
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
  egress:
    - {} # allow all egress (DNS, external APIs, etc.)
