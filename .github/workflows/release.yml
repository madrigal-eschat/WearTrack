name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release
          if git describe --tags --exact-match HEAD > /dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$(git describe --tags --exact-match HEAD | sed 's/^v//')" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  publish-image:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push multi-platform release image
        # ubuntu-latest's Docker Engine uses the "docker" buildx driver, which
        # cannot produce/load a multi-platform image locally (that needs the
        # containerd image store, not enabled on GitHub-hosted runners). Push
        # straight from buildx with every tag in one multi-platform build,
        # reusing ci.yml's build cache so this is a cache-hit re-assembly
        # rather than a full recompile.
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          IMAGE="ghcr.io/${{ github.repository }}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${MAJOR}" \
            -t "${IMAGE}:${MINOR}" \
            --cache-from type=gha,scope=ci \
            --push .
